name: K8s Manifest Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Kubernetes manifests with Kube-Linter
      uses: stackrox/kube-linter-action@v1.0.4
      with:
        directory: apps/test-web-server
